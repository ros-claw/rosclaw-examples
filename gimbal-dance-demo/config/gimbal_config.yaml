# ROSClaw Dance Demo — 6 Gimbals Configuration
# 6台云台一字排开，从左到右：1-6
# 
# 硬件拓扑:
#   USB Hub (带独立供电)
#   ├── Port 1 → Gimbal  1 (/dev/ttyUSB0 或 /dev/ttyCH341USB0)  ← Left 1
#   ├── Port 2 → Gimbal  2 (/dev/ttyUSB1)  ← Left 2
#   ├── Port 3 → Gimbal  3 (/dev/ttyUSB2)  ← Center 1
#   ├── Port 4 → Gimbal  4 (/dev/ttyUSB3)  ← Center 2
#   ├── Port 5 → Gimbal  5 (/dev/ttyUSB4)  ← Right 1
#   └── Port 6 → Gimbal  6 (/dev/ttyUSB5)  ← Right 2

serial:
  baudrate: 115200
  bytesize: 8
  parity: N
  stopbits: 1
  timeout: 0.01

gimbals:
  # ── Left Group (左1-2): 节奏型 ───────────────────────────────────────────
  - id: 1
    port: /dev/ttyCH341USB0    # Linux CH341串口，根据实际情况修改
    group: drummers
    label: "Left 1"
    position: { x: -2.5, y: 0.0 }

  - id: 2
    port: /dev/ttyCH341USB1
    group: drummers
    label: "Left 2"
    position: { x: -1.5, y: 0.0 }

  # ── Center Group (中3-4): 波浪型 ─────────────────────────────────────────
  - id: 3
    port: /dev/ttyCH341USB2
    group: vocals
    label: "Center 1"
    position: { x: -0.5, y: 0.0 }

  - id: 4
    port: /dev/ttyCH341USB3
    group: vocals
    label: "Center 2"
    position: { x: 0.5, y: 0.0 }

  # ── Right Group (右5-6): 追光型 ──────────────────────────────────────────
  - id: 5
    port: /dev/ttyCH341USB4
    group: spotlight
    label: "Right 1"
    position: { x: 1.5, y: 0.0 }

  - id: 6
    port: /dev/ttyCH341USB5
    group: spotlight
    label: "Right 2"
    position: { x: 2.5, y: 0.0 }

# Safety limits
limits:
  max_pan_deg:   120.0
  max_tilt_deg:   60.0
  min_tilt_deg:  -80.0
  tick_hz:        50

# Demo presets
presets:
  cyberpunk:
    description: "Cyberpunk 2077 theme — dark, aggressive, 105 BPM"
    bpm: 105
    vibe: "Dark Industrial"
    drop_intensity: 1.0

  rave:
    description: "Classic rave — maximum energy, 140 BPM"
    bpm: 140
    vibe: "Energetic EDM"
    drop_intensity: 1.0

  ambient:
    description: "Ambient drone — calm background 60 BPM"
    bpm: 60
    vibe: "Atmospheric"
    drop_intensity: 0.4