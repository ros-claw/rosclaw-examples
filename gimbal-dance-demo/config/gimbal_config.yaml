# ROSClaw Dance Demo — Gimbal Hardware Configuration
# 10 GCU gimbals connected via USB Hub (USB-to-Serial adapters)
# Each gimbal must have a unique CAN/serial ID set via its configuration tool.
#
# Hardware topology:
#   USB Hub
#   ├── Port 1 → Gimbal  1 (COM3  / /dev/ttyUSB0)  ← Drummer 1
#   ├── Port 2 → Gimbal  2 (COM4  / /dev/ttyUSB1)  ← Drummer 2
#   ├── Port 3 → Gimbal  3 (COM5  / /dev/ttyUSB2)  ← Drummer 3
#   ├── Port 4 → Gimbal  4 (COM6  / /dev/ttyUSB3)  ← Vocal 1
#   ├── Port 5 → Gimbal  5 (COM7  / /dev/ttyUSB4)  ← Vocal 2
#   ├── Port 6 → Gimbal  6 (COM8  / /dev/ttyUSB5)  ← Vocal 3
#   ├── Port 7 → Gimbal  7 (COM9  / /dev/ttyUSB6)  ← Vocal 4
#   ├── Port 8 → Gimbal  8 (COM10 / /dev/ttyUSB7)  ← Spotlight 1
#   ├── Port 9 → Gimbal  9 (COM11 / /dev/ttyUSB8)  ← Spotlight 2
#   └── Port 10 → Gimbal 10 (COM12 / /dev/ttyUSB9)  ← Spotlight 3

serial:
  baudrate: 115200
  bytesize: 8
  parity: N
  stopbits: 1
  timeout: 0.01

gimbals:
  # ── Drummer Group (tilt-dominant: headbang) ──────────────────────────────
  - id: 1
    port: COM3        # Linux: /dev/ttyUSB0
    group: drummers
    label: "Drummer 1"
    position: { x: -1.5, y: 0.0 }   # physical position on stage (meters)

  - id: 2
    port: COM4
    group: drummers
    label: "Drummer 2"
    position: { x: 0.0, y: 0.0 }

  - id: 3
    port: COM5
    group: drummers
    label: "Drummer 3"
    position: { x: 1.5, y: 0.0 }

  # ── Vocal Group (pan-dominant: sweep / wave) ─────────────────────────────
  - id: 4
    port: COM6
    group: vocals
    label: "Vocal 1"
    position: { x: -2.0, y: 1.0 }

  - id: 5
    port: COM7
    group: vocals
    label: "Vocal 2"
    position: { x: -0.7, y: 1.0 }

  - id: 6
    port: COM8
    group: vocals
    label: "Vocal 3"
    position: { x: 0.7, y: 1.0 }

  - id: 7
    port: COM9
    group: vocals
    label: "Vocal 4"
    position: { x: 2.0, y: 1.0 }

  # ── Spotlight Group (both axes: figure8 / strobe_center) ─────────────────
  - id: 8
    port: COM10
    group: spotlight
    label: "Spotlight 1"
    position: { x: -1.0, y: 2.0 }

  - id: 9
    port: COM11
    group: spotlight
    label: "Spotlight 2"
    position: { x: 0.0, y: 2.0 }

  - id: 10
    port: COM12
    group: spotlight
    label: "Spotlight 3"
    position: { x: 1.0, y: 2.0 }

# Safety limits (applied in rhythm_engine.py)
limits:
  max_pan_deg:   120.0
  max_tilt_deg:   60.0
  min_tilt_deg:  -80.0
  tick_hz:        50      # hardware command frequency

# Demo presets
presets:
  cyberpunk:
    description: "Cyberpunk 2077 theme — dark, aggressive, 105 BPM"
    bpm: 105
    vibe: "Dark Industrial"
    drop_intensity: 1.0

  rave:
    description: "Classic rave — maximum energy, 140 BPM"
    bpm: 140
    vibe: "Energetic EDM"
    drop_intensity: 1.0

  ambient:
    description: "Ambient drone — calm background 60 BPM"
    bpm: 60
    vibe: "Atmospheric"
    drop_intensity: 0.4
